<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Vision | Medical AR</title>

    <!-- 1. Import A-Frame (3D Engine) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <!-- 2. Import AR.js (Marker Tracking) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- 3. Import MediaPipe (Hand Tracking) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs" type="module"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background-color: #000;
        }

        /* --- Professional Medical UI --- */
        #ui-layer {
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none; /* Let touches pass through to 3D scene */
            z-index: 100; 
            display: flex;
            flex-direction: column; 
            justify-content: space-between;
            padding: 5vh 5vw; 
            box-sizing: border-box;
        }

        /* Frosted Glass Header */
        .header {
            background: rgba(10, 25, 47, 0.6); 
            color: #ffffff; 
            padding: 20px;
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .header h1 {
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 800;
            letter-spacing: 1px;
            color: #00ffcc;
            text-transform: uppercase;
        }

        .header p {
            margin: 8px 0 0 0; 
            font-size: 0.85rem; 
            color: #8892b0; 
            font-weight: 600;
        }

        /* Animated Status Pill */
        .status-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .status {
            background: rgba(10, 25, 47, 0.8); 
            color: #00ffcc; 
            padding: 12px 24px;
            border-radius: 30px; 
            text-align: center; 
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 255, 204, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.active {
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background-color: #ff3366;
            box-shadow: 0 0 8px #ff3366;
            animation: pulse-dot 1.5s infinite;
        }

        .status.active .status-dot {
            background-color: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Target Crosshair Overlay */
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            pointer-events: none;
            z-index: 50;
        }
        .crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 10px; height: 10px;
            background: rgba(0, 255, 204, 0.5); border-radius: 50%;
        }

        /* --- Sleek Loading Screen --- */
        #loading {
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background: #0a192f; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            z-index: 999; 
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00ffcc;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 20px;
        }

        .loader::before {
            content: ""; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
            border-radius: 50%; border: 3px solid transparent; border-top-color: #ff3366;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .loading-text { color: #ccd6f6; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px;}
        .loading-subtext { color: #8892b0; font-size: 0.9rem; margin-top: 10px; }

    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="loader"></div>
        <div class="loading-text">INITIALIZING BIO-VISION</div>
        <div class="loading-subtext">Calibrating AR & Hand Tracking Core...</div>
    </div>

    <!-- UI Overlay -->
    <div class="crosshair"></div>
    <div id="ui-layer">
        <div class="header">
            <h1>Bio-Vision</h1>
            <p>Spatial Gesture Interface v1.0</p>
        </div>
        <div class="status-container">
            <div id="ai-status" class="status">
                <div class="status-dot"></div>
                <span>Scanning for Hand...</span>
            </div>
        </div>
    </div>

    <!-- 
      A-FRAME AR SCENE 
      Notice sourceWidth and sourceHeight: This forces the highest un-cropped wide angle available!
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false; trackingMethod: best;" 
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true;"
        gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
        
        <a-assets>
            <!-- Pre-load compressed MRI model -->
            <a-asset-item id="my-heart" src="heart_compressed.glb"></a-asset-item>
        </a-assets>

        <!-- Hiro Marker Anchor -->
        <a-marker preset="hiro" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
            <!-- 
               HEART CONTAINER
               We rotate this empty container using the AI, which smoothly spins the model inside it.
            -->
            <a-entity id="heart-container" position="0 0.5 0">
                <a-gltf-model src="#my-heart" scale="1.5 1.5 1.5" animation-mixer></a-gltf-model>
            </a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <!-- MAIN AI LOGIC -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const loadingScreen = document.getElementById("loading");
        const statusTextSpan = document.querySelector("#ai-status span");
        const statusPill = document.getElementById("ai-status");
        const heartContainer = document.getElementById("heart-container");

        let handLandmarker;
        let lastVideoTime = -1;
        
        // Advanced Smoothing Variables
        let smoothX = 0; 
        let smoothY = 0;
        let isHandPresent = false;
        let lostHandTimeout = null;

        // 1. Initialize Google MediaPipe AI
        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, 
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", 
                    numHands: 1,
                    minHandDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });
                
                // Fade out loading screen
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = "none", 500);
                
                findVideoFeed();
            } catch (error) {
                console.error("AI Init Error:", error);
                document.querySelector(".loading-text").innerText = "NETWORK ERROR";
                document.querySelector(".loading-subtext").innerText = "Please check internet connection.";
            }
        }

        // 2. Connect AI to the hidden AR.js Camera Feed
        function findVideoFeed() {
            const video = document.querySelector('video');
            if (video && video.readyState >= 2) { 
                predictWebcam(video); 
            } else if (video) { 
                video.addEventListener('loadeddata', () => predictWebcam(video)); 
            } else { 
                setTimeout(findVideoFeed, 500); 
            }
        }

        // 3. Main Tracking & Render Loop
        async function predictWebcam(video) {
            // Apply a subtle floating/beating pulse to the heart to make it feel "alive"
            const time = Date.now() * 0.003;
            const pulse = 1 + Math.sin(time) * 0.015;
            heartContainer.setAttribute('scale', `${pulse} ${pulse} ${pulse}`);

            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // Process current frame
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks.length > 0) {
                    // Hand is detected
                    if (!isHandPresent) {
                        statusTextSpan.innerText = "Tracking Hand...";
                        statusPill.classList.add("active");
                        isHandPresent = true;
                        clearTimeout(lostHandTimeout);
                    }

                    // Grab the wrist coordinate (landmark 0)
                    const wrist = results.landmarks[0][0];

                    // Smooth the movement to remove jitter
                    smoothX += (wrist.x - smoothX) * 0.15;
                    smoothY += (wrist.y - smoothY) * 0.15;

                    // Convert hand position to 3D rotation (multiplier controls sensitivity)
                    const rotX = (smoothY - 0.5) * 180;
                    const rotY = (smoothX - 0.5) * 180;

                    heartContainer.setAttribute('rotation', `${rotX} ${rotY} 0`);
                } else {
                    // Hand is lost
                    if (isHandPresent) {
                        isHandPresent = false;
                        lostHandTimeout = setTimeout(() => {
                            statusTextSpan.innerText = "Scanning for Hand...";
                            statusPill.classList.remove("active");
                        }, 500); // 0.5s delay prevents flickering if AI loses hand for 1 frame
                    }

                    // Smoothly auto-rotate back to the center if no hand is detected
                    const currentRot = heartContainer.getAttribute('rotation');
                    if(currentRot) {
                        heartContainer.setAttribute('rotation', `${currentRot.x * 0.92} ${currentRot.y * 0.92} 0`);
                    }
                }
            }
            
            // Loop infinitely
            requestAnimationFrame(() => predictWebcam(video));
        }

        // Start the engine
        initAI();
    </script>
</body>
</html>
